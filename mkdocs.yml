site_name: bots_airflow
site_description: Airflow-oriented extraction layer around Bots translation mechanics.
site_url: https://bots-airflow.readthedocs.io/
repo_url: https://github.com/rion/bots-airflow
repo_name: rion/bots-airflow
docs_dir: docs

theme:
  name: material

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Quickstart: quickstart.md
  - Translation Execution: translation-execution.md
  - TranslationContext: translation-context.md
  - Mapping in Airflow: mapping-in-airflow.md
  - Runtime Modules: runtime-modules.md
  - Extract Recorddefs: extract-recorddefs.md
  - Release and Docs: release.md
